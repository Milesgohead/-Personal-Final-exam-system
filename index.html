<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>期末考试日程看板</title>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fb;color:#0f172a;display:grid;place-items:center}
    .box{width:min(420px,calc(100% - 32px));background:white;border:1px solid #e6ebf2;border-radius:22px;box-shadow:0 18px 50px rgba(15,23,42,.10);padding:28px;text-align:center}
    .logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#38bdf8,#2563eb);color:white;display:grid;place-items:center;margin:0 auto 14px;font-weight:1000;font-size:22px;box-shadow:0 10px 24px rgba(37,99,235,.24)}
    h1{font-size:18px;margin:0 0 8px}p{margin:0;color:#64748b;font-size:13px;line-height:1.7}.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:18px}.bar span{display:block;height:100%;width:36%;border-radius:999px;background:linear-gradient(90deg,#4ade80,#22c55e);animation:load 1.1s ease-in-out infinite alternate}@keyframes load{to{transform:translateX(180%)}}
    .err{color:#dc2626;margin-top:14px;white-space:pre-wrap;text-align:left;background:#fff1f2;border:1px solid #ffe4e6;border-radius:12px;padding:12px;display:none}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">F</div>
    <h1>正在加载最新版看板</h1>
    <p>期末考试日程 · 课程复习进程 · 章节预估时长</p>
    <div class="bar"><span></span></div>
    <div class="err" id="err"></div>
  </div>
  <script>
    (async function(){
      const errorBox = document.getElementById('err');
      try {
        const res = await fetch('chunks/latest.00.txt?v=duration-height-original', { cache: 'no-store' });
        if (!res.ok) throw new Error('无法读取最新版文件：HTTP ' + res.status);
        const b64 = (await res.text()).trim();
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        let html = '';
        if ('DecompressionStream' in window) {
          const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
          html = await new Response(stream).text();
        } else {
          throw new Error('当前浏览器不支持在线解压，请使用新版 Chrome / Edge 打开。');
        }
        const scrollFix = `<style id="online-scroll-fix">
          .calendar-wrap, .course-view, .right-panel, .chapter-list, .review-day { overscroll-behavior: contain; }
          .course-view { overflow-y: auto !important; overflow-x: auto !important; }
          .course-shell { padding-bottom: 48px !important; }
          .review-calendar-wrap { overflow-x: auto !important; overflow-y: auto !important; max-height: calc(100dvh - 360px); }
          .review-calendar-grid { align-items: flex-start !important; }
          .right-panel { overflow-y: auto !important; }
        </style>`;
        html = html.replace('</head>', scrollFix + '</head>');
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        console.error(err);
        errorBox.style.display = 'block';
        errorBox.textContent = '加载失败：' + err.message + '\n请按 Ctrl+F5 强制刷新，或稍后再试。';
      }
    })();
  </script>
</body>
</html>
