<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>期末考试日程看板 · 复习进程版</title>
  <style>
    :root {
      --bg: #f4f6fa;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e6ebf2;
      --line-soft: #f0f3f8;
      --text: #0f172a;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --blue: #0ea5e9;
      --blue-dark: #0284c7;
      --green: #10b981;
      --amber: #f59e0b;
      --pink: #ec4899;
      --purple: #8b5cf6;
      --red: #ef4444;
      --jelly-green: #42f15c;
      --jelly-green-deep: #18c94d;
      --jelly-green-soft: #dcfce7;
      --shadow: 0 12px 34px rgba(15, 23, 42, .08);
      --side-w: 220px;
      --right-w: 310px;
      --time-w: 70px;
      --hour-h: 78px;
      --radius: 16px;
      --safe-vh: 100dvh;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; background: none; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .app-shell {
      width: 100%;
      height: var(--safe-vh);
      display: grid;
      grid-template-columns: var(--side-w) minmax(0, 1fr) var(--right-w);
      overflow: hidden;
    }

    .sidebar, .main-panel, .right-panel { min-width: 0; background: var(--panel); }
    .sidebar {
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      z-index: 5;
    }

    .brand {
      height: 66px;
      padding: 14px 18px;
      display: flex;
      gap: 11px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .brand-mark {
      width: 35px; height: 35px; border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white; display: grid; place-items: center; font-weight: 1000;
      box-shadow: 0 8px 18px rgba(37, 99, 235, .22); flex-shrink: 0;
    }
    .brand-title { font-size: 13px; font-weight: 900; line-height: 1.1; white-space: nowrap; }
    .brand-sub { font-size: 10px; color: var(--muted-2); font-weight: 800; text-transform: uppercase; letter-spacing: .08em; margin-top: 3px; white-space: nowrap; }

    .nav-section { padding: 16px 14px; }
    .section-title { display: block; margin: 6px 10px 9px; font-size: 10px; color: var(--muted-2); font-weight: 1000; text-transform: uppercase; letter-spacing: .08em; }
    .nav-list { display: grid; gap: 3px; }
    .nav-item {
      height: 38px; padding: 0 10px; border-radius: 11px;
      display: flex; align-items: center; gap: 12px; color: var(--muted);
      font-size: 13px; font-weight: 800; transition: .16s ease; text-decoration: none; white-space: nowrap;
    }
    .nav-item:hover { background: var(--panel-soft); color: var(--text); }
    .nav-item.active { background: #eef6ff; color: #075985; }
    .nav-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }
    .nav-badge { margin-left: auto; min-width: 20px; height: 18px; border-radius: 999px; background: var(--blue); color: white; display: grid; place-items: center; font-size: 10px; font-weight: 1000; }
    .project-dot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
    .dot-blue { background: #0ea5e9; } .dot-amber { background: #f59e0b; } .dot-pink { background: #ec4899; }

    .user-footer { border-top: 1px solid var(--line); background: #fbfdff; padding: 13px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .avatar { width: 34px; height: 34px; border-radius: 999px; background: #e0f2fe; border: 1px solid #bae6fd; color: #0369a1; display: grid; place-items: center; font-weight: 1000; font-size: 11px; flex-shrink: 0; }
    .user-meta { min-width: 0; }
    .user-name { font-size: 12px; font-weight: 1000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-sub { font-size: 10px; color: var(--muted-2); margin-top: 2px; }
    .reset-mini { margin-left: auto; color: var(--muted-2); width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; }
    .reset-mini:hover { background: #fee2e2; color: #dc2626; }

    .main-panel { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--line); }

    .topbar {
      min-height: 66px; padding: 12px 18px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; flex-shrink: 0;
      background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
    }

    .view { display: none; flex: 1; overflow: hidden; }
    .view.active { display: flex; flex-direction: column; }

    .calendar-wrap { flex: 1; overflow: auto; }

    .course-board {
      display: grid;
      grid-template-columns: 320px minmax(0,1fr);
      gap: 16px;
      padding: 16px;
    }

    .chapter-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: grab;
    }

    .review-day {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      min-height: 120px;
    }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"></aside>
  <main class="main-panel">
    <div class="topbar"></div>
    <section class="view active" id="calendar-view"></section>
    <section class="view" id="course-view">
      <div class="course-board">
        <div>
          <h3>章节库</h3>
          <div class="chapter-card">示例章节</div>
        </div>
        <div>
          <h3>复习日历（横向）</h3>
          <div class="review-day">拖拽区域</div>
        </div>
      </div>
    </section>
  </main>
  <aside class="right-panel"></aside>
</div>
<script>
// simplified placeholder
console.log('loaded');
</script>
</body>
</html>
