<style>

lex;gap:10px;align-items:center;flex-wrap:wrap}.pill{height:26px;padding:0 10px;border-radius:999px;background:#f1f5f9;color:var(--muted);font-size:11px;font-weight:1000;display:inline-flex;align-items:center}.today{font-size:14px;font-weight:900}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.seg{height:36px;border:1px solid var(--line);border-radius:12px;background:#f8fafc;padding:3px;display:flex}.seg button{height:28px;border-radius:9px;padding:0 13px;font-size:12px;font-weight:900;color:var(--muted)}.seg button.on{background:#fff;color:#0f172a;box-shadow:0 2px 10px rgba(15,23,42,.08)}.btn{min-height:34px;border-radius:12px;padding:0 13px;font-weight:1000;font-size:12px;display:inline-flex;gap:6px;align-items:center;justify-content:center}.primary{background:#0ea5e9;color:white;box-shadow:0 8px 18px rgba(14,165,233,.2)}.ghost{border:1px solid var(--line);background:#f8fafc;color:#334155}.danger{background:#fff1f2;color:#e11d48;border:1px solid #ffe4e6}.view{display:none;flex:1;min-height:0;overflow:hidden}.view.on{display:flex;flex-direction:column}.scroll{flex:1;overflow:auto}.month-wrap{padding:18px;min-width:850px}.month-grid{display:grid;grid-template-columns:repeat(7,minmax(112px,1fr));border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}.dow{height:42px;background:#f8fafc;border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:1000;color:#64748b}.day{min-height:138px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px;background:#fff}.day.off{background:#fafafa;color:#cbd5e1}.day.today{background:#f0f9ff}.day-num{font-size:12px;font-weight:1000;color:#475569;margin-bottom:7px}.today .day-num span{background:#0ea5e9;color:white;border-radius:999px;padding:3px 7px}.mini-exam{position:relative;width:100%;text-align:left;border-radius:11px;padding:7px 8px;margin:5px 0;font-size:11px;font-weight:900;line-height:1.25;box-shadow:0 5px 14px rgba(15,23,42,.08);border-left:4px solid var(--blue);background:#e0f2fe;color:#075985}.mini-exam small{display:block;font-size:9px;color:#64748b;margin-top:2px}.week-canvas{min-width:900px;height:100%;display:flex;flex-direction:column}.week-head{display:grid;grid-template-columns:70px repeat(7,minmax(120px,1fr));height:50px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:3}.time-head,.wh{border-right:1px solid var(--line);display:grid;place-items:center;font-weight:1000;font-size:11px;color:#64748b}.wh.today{background:#f0f9ff;color:#0284c7}.week-body{display:grid;grid-template-columns:70px repeat(7,minmax(120px,1fr));position:relative;height:780px}.axis{border-right:1px solid var(--line);background:#fbfdff;position:relative}.tl{position:absolute;right:10px;transform:translateY(-8px);font-size:11px;color:#94a3b8;font-weight:900}.col{position:relative;border-right:1px solid var(--line);background:#fff}.line{position:absolute;left:0;right:0;height:78px;border-bottom:1px solid #f0f3f8}.line:hover{background:#f0f9ff}.exam-card{position:absolute;left:8px;right:8px;border-left:4px solid var(--blue);background:#e0f2fe;color:#075985;border-radius:12px;padding:8px 9px;text-align:left;box-shadow:0 8px 18px rgba(15,23,42,.08);overflow:hidden}.exam-card b{display:block;font-size:12px}.exam-card small{font-size:9px;color:#475569}.nowline{position:absolute;height:2px;background:#ef4444;z-index:10;pointer-events:none}.right{background:#fff;overflow:auto}.box{padding:18px;border-bottom:1px solid var(--line)}.box h3{margin:0 0 12px;font-size:12px;font-weight:1000;letter-spacing:.06em}.next{background:linear-gradient(135deg,#eff6ff,#f8fafc)}.next h2{font-size:16px;margin:5px 0 8px}.event-item{border:1px solid #f1f5f9;border-radius:13px;padding:9px;margin:8px 0;text-align:left;width:100%;background:white}.event-item:hover{background:#f8fafc}.task{display:flex;gap:8px;align-items:center;border:1px solid #f1f5f9;background:#f8fafc;border-radius:12px;padding:8px;margin:7px 0;font-size:12px}.empty{text-align:center;color:#94a3b8;font-size:12px;padding:22px}.course-page{display:grid;grid-template-columns:330px minmax(0,1fr);gap:16px;padding:16px;min-height:0;flex:1;overflow:hidden;background:#f5f7fb}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);min-height:0;overflow:hidden}.panel-head{padding:14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}.panel-body{padding:14px;overflow:auto;max-height:calc(100vh - 170px)}.progress{display:grid;grid-template-columns:94px 1fr;gap:12px;align-items:center}.ring{width:84px;height:84px;border-radius:50%;background:conic-gradient(var(--jelly) var(--p),#e2e8f0 0);display:grid;place-items:center}.ring:after{content:attr(data-p);width:58px;height:58px;border-radius:50%;background:#fff;display:grid;place-items:center;font-weight:1000;color:#16a34a}.stat{font-size:12px;color:var(--muted);line-height:1.8}.add-row{display:flex;gap:6px;margin:13px 0}.input{border:1px solid var(--line);border-radius:11px;padding:8px 9px;outline:0;min-width:0;background:#fff}.input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,.12)}.chapter{border:1px solid var(--line);border-radius:16px;padding:10px;margin:9px 0;background:#fff;position:relative;cursor:grab}.chapter.selected{outline:3px solid rgba(14,165,233,.16);border-color:#0ea5e9}.chapter.done{background:linear-gradient(135deg,#bbf7d0,#4ade80);border-color:#86efac;color:#064e3b;box-shadow:0 10px 22px rgba(34,197,94,.22)}.chapter .ct{font-weight:1000;font-size:13px;padding-right:56px}.chapter .cm{font-size:11px;color:#64748b;margin-top:4px}.chapter.done .cm{color:#14532d}.tools{position:absolute;right:8px;top:7px;display:flex;gap:4px}.tool{width:23px;height:23px;border-radius:8px;background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;font-size:12px}.tool:hover{background:#e0f2fe;color:#0284c7}.tool.del:hover{background:#fee2e2;color:#dc2626}.strip-wrap{overflow-x:auto;overflow-y:hidden;padding:14px;background:#f8fafc;height:calc(100vh - 170px)}.strip{display:flex;gap:12px;align-items:flex-start;min-width:max-content}.review-day{width:178px;min-height:520px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;flex:0 0 178px}.review-day.today{border-color:#0ea5e9;background:#f0f9ff}.review-day.fullgreen{background:linear-gradient(180deg,#f0fdf4,#dcfce7);border-color:#86efac}.rdh{font-weight:1000;font-size:12px;color:#334155;margin-bottom:8px}.drop-tip{font-size:11px;color:#94a3b8;border:1px dashed #cbd5e1;border-radius:12px;padding:12px;text-align:center}.sched-card{width:100%;border-radius:14px;padding:9px;margin:8px 0;background:#e0f2fe;border-left:4px solid #0ea5e9;font-size:12px;box-shadow:0 6px 15px rgba(15,23,42,.08);position:relative;overflow:hidden}.sched-card.done{background:linear-gradient(135deg,#bbf7d0,#4ade80);border-color:#22c55e;color:#064e3b}.sched-card b{display:block;font-size:12px}.sched-card small{display:block;color:#64748b;margin-top:3px}.sched-card.done small{color:#14532d}.sched-actions{position:absolute;right:6px;top:6px;display:flex;gap:4px}.sched-actions button{width:20px;height:20px;border-radius:7px;background:rgba(255,255,255,.7)}.modal{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}.modal.on{display:flex}.dialog{width:min(460px,100%);background:white;border-radius:20px;box-shadow:0 24px 70px rgba(15,23,42,.24);overflow:hidden}.dialog h3{margin:0;padding:15px 17px;background:#f8fafc;border-bottom:1px solid var(--line);font-size:15px}.form{padding:16px;display:grid;gap:11px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.label{font-size:11px;font-weight:1000;color:#64748b;margin-bottom:4px}.toast{position:fixed;right:18px;bottom:18px;background:#0f172a;color:white;border-radius:16px;padding:12px 14px;font-size:12px;font-weight:800;box-shadow:0 14px 40px rgba(15,23,42,.25);opacity:0;transform:translateY(14px);transition:.2s;z-index:70}.toast.on{opacity:1;transform:translateY(0)}@media(max-width:980px){.app{grid-template-columns:64px minmax(0,1fr)}.right{display:none}.brand div:nth-child(2),.nav span.txt,.footer{display:none}.nav button{justify-content:center;padding:0}.course-page{grid-template-columns:1fr}.panel-body{max-height:none}.strip-wrap{height:450px}}@media(max-width:640px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr}.side{height:auto}.brand div:nth-child(2),.nav span.txt,.footer{display:block}.nav{display:flex;overflow:auto;padding:8px}.nav button{width:auto}.main{min-height:100vh}.top{align-items:flex-start}.course-page{padding:10px}.review-day{width:165px;flex-basis:165px}.month-wrap{padding:10px}}

<body>
<div class="app">
  <aside class="side"><div><div class="brand"><div class="logo">F</div><div><div class="bt">Final Exam OS</div><div class="bs">Study Control</div></div></div><div class="nav"><div class="cap">MAIN</div><button class="active" id="navCal" onclick="backCalendar()">📅 <span class="txt">Exam Calendar</span></button><button onclick="showStats()">📊 <span class="txt">Statistics</span></button><button onclick="resetAll()">↺ <span class="txt">Reset Data</span></button></div></div><div class="footer"><span>Local saved</span><button onclick="resetAll()">↺</button></div></aside>
  <main class="main">
    <header class="top"><div class="left-title"><span class="pill" id="modePill">Calendar</span><div class="today" id="todayText"></div></div><div class="actions" id="mainActions"></div></header>
    <section class="view on" id="calendarView"><div class="scroll" id="calendarArea"></div></section>
    <section class="view" id="courseView"></section>
  </main>
  <aside class="right" id="rightPanel"></aside>
</div>
<div class="modal" id="examModal"><div class="dialog"><h3 id="examModalTitle">编辑考试</h3><form class="form" onsubmit="saveExam(event)"><input type="hidden" id="exId"><div><div class="label">课程</div><input class="input" id="exCourse" required></div><div class="grid2"><div><div class="label">日期</div><input class="input" id="exDate" type="date" required></div><div><div class="label">时间</div><input class="input" id="exTime" placeholder="14:00-16:00" required></div></div><div class="grid2"><div><div class="label">地点</div><input class="input" id="exLoc" required></div><div><div class="label">座号</div><input class="input" id="exSeat" required></div></div><div style="display:flex;justify-content:space-between;gap:8px"><button type="button" class="btn danger" onclick="deleteExam()">删除</button><div><button type="button" class="btn ghost" onclick="closeModal('examModal')">取消</button><button class="btn primary">保存</button></div></div></form></div></div>
<div class="modal" id="chapterModal"><div class="dialog"><h3>编辑章节</h3><form class="form" onsubmit="saveChapter(event)"><input type="hidden" id="chId"><div><div class="label">章节标题</div><input class="input" id="chTitle" required></div><div class="grid2"><div><div class="label">预估时长 h</div><input class="input" id="chDur" type="number" step="0.5" min="0.5" max="12" required></div><div><div class="label">状态</div><select class="input" id="chStatus"><option value="todo">未开始</option><option value="doing">进行中</option><option value="done">已完成</option></select></div></div><div><div class="label">安排日期</div><input class="input" id="chDate" type="date"></div><div><div class="label">备注</div><textarea class="input" id="chNote" rows="3"></textarea></div><div style="display:flex;justify-content:space-between;gap:8px"><button type="button" class="btn danger" onclick="deleteChapterFromModal()">删除章节</button><div><button type="button" class="btn ghost" onclick="closeModal('chapterModal')">取消</button><button class="btn primary">保存</button></div></div></form></div></div>
<div class="toast" id="toast"></div>
<script>
const EXAMS0=[{id:'e1',course:'伺服电机技术',date:'2026-06-28',time:'14:00-16:00',location:'教三405',seat:'9'},{id:'e2',course:'电子技术',date:'2026-06-29',time:'08:10-10:10',location:'教三505',seat:'2'},{id:'e3',course:'机械设计基础',date:'2026-06-30',time:'10:40-12:40',location:'教三401',seat:'2'},{id:'e4',course:'离散控制系统',date:'2026-07-02',time:'08:10-10:10',location:'教三408',seat:'4'},{id:'e5',course:'机器人技术及其应用',date:'2026-07-03',time:'10:40-12:40',location:'教三208',seat:'2'},{id:'e6',course:'微积分Ⅰ',date:'2026-07-03',time:'14:00-16:00',location:'教三204',seat:'21'}];
let exams=load('exams',EXAMS0), chapters=load('chapters',{}), view='month', weekStart=today(), monthCursor=new Date(today().getFullYear(),today().getMonth(),1), activeCourse=null, selectedChapter=null;
function load(k,d){try{return JSON.parse(localStorage.getItem(k))??structuredClone(d)}catch{return structuredClone(d)}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function today(){const p=new URLSearchParams(location.search).get('today');return p?new Date(p+'T00:00:00'):new Date(new Date().toDateString())}function md(s){const d=new Date(s+'T00:00:00');return (d.getMonth()+1)+'.'+d.getDate()}function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}function cnDay(d){return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]}function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),1800)}function closeModal(id){document.getElementById(id).classList.remove('on')}
function init(){ensureChapters();render();}function ensureChapters(){exams.forEach(e=>{if(!chapters[e.course])chapters[e.course]=[1,2,3,4,5].map(i=>({id:'c'+Date.now()+i+Math.random(),title:'第 '+i+' 章',duration:i%2?1.5:2,status:'todo',date:'',note:''}))});save('chapters',chapters)}
function render(){document.getElementById('todayText').innerHTML='今天：<strong>'+md(iso(today()))+'</strong> '+cnDay(today());document.getElementById('modePill').textContent=activeCourse?'Course Progress':'Calendar';renderActions();renderCalendar();renderRight()}
function renderActions(){const a=document.getElementById('mainActions');if(activeCourse){a.innerHTML='<button class="btn ghost" onclick="backCalendar()">← 返回日历</button><button class="btn ghost" onclick="clearCourse()">清空本课安排</button><button class="btn primary" onclick="openChapter()">+ 新章节</button>';return}a.innerHTML='<div class="seg"><button class="'+(view==='month'?'on':'')+'" onclick="view=\'month\';render()">月视图</button><button class="'+(view==='week'?'on':'')+'" onclick="view=\'week\';render()">周视图</button></div><button class="btn ghost" onclick="nav(-1)">‹</button><button class="btn ghost" onclick="nav(1)">›</button><button class="btn primary" onclick="openExam()">+ 新考试</button>'}
function renderCalendar(){if(activeCourse){renderCourse();return}document.getElementById('calendarView').classList.add('on');document.getElementById('courseView').classList.remove('on');view==='month'?renderMonth():renderWeek()}
function renderMonth(){const area=document.getElementById('calendarArea'), y=monthCursor.getFullYear(), m=monthCursor.getMonth();let first=new Date(y,m,1), start=addDays(first,-first.getDay());let html='<div class="month-wrap"><h2>'+ (m+1)+'月 '+y+'</h2><div class="month-grid">';['日','一','二','三','四','五','六'].forEach(d=>html+='<div class="dow">'+d+'</div>');for(let i=0;i<42;i++){let d=addDays(start,i), s=iso(d), cls='day '+(d.getMonth()!=m?'off ':'')+(s===iso(today())?'today':'');html+='<div class="'+cls+'"><div class="day-num"><span>'+md(s)+'</span></div>'+exams.filter(e=>e.date===s).map(examCardMini).join('')+'</div>'}html+='</div></div>';area.innerHTML=html}
function renderWeek(){const area=document.getElementById('calendarArea');let days=[0,1,2,3,4,5,6].map(i=>addDays(weekStart,i));let html='<div class="week-canvas"><div class="week-head"><div class="time-head">TIME</div>'+days.map(d=>'<div class="wh '+(iso(d)===iso(today())?'today':'')+'">'+cnDay(d)+'<br>'+md(iso(d))+'</div>').join('')+'</div><div class="week-body"><div class="axis">';for(let h=8;h<=18;h++)html+='<div class="tl" style="top:'+((h-8)*78)+'px">'+String(h).padStart(2,'0')+':00</div>';html+='</div>';days.forEach(d=>{let s=iso(d);html+='<div class="col">';for(let h=8;h<18;h++)html+='<button class="line" style="top:'+((h-8)*78)+'px" onclick="openExam(\''+s+'\',\''+String(h).padStart(2,'0')+':00-'+String(h+1).padStart(2,'0')+':00\')"></button>';exams.filter(e=>e.date===s).forEach(e=>html+=examWeekCard(e));html+='</div>'});html+='</div></div>';area.innerHTML=html}
function examCardMini(e){return '<button class="mini-exam" onclick="openCourse(\''+e.course+'\')">'+e.course+'<small>'+e.time+' · '+e.location+' · 座号'+e.seat+'</small></button>'}function parseT(t){let [h,m]=t.split(':').map(Number);return h+m/60}function examWeekCard(e){let [a,b]=e.time.split('-'), top=(parseT(a)-8)*78, h=Math.max(45,(parseT(b)-parseT(a))*78-8);return '<button class="exam-card" style="top:'+top+'px;height:'+h+'px" onclick="openCourse(\''+e.course+'\')"><b>'+e.course+'</b><small>'+e.time+' · '+e.location+' · 座号'+e.seat+'</small></button>'}
function nav(n){if(view==='month')monthCursor.setMonth(monthCursor.getMonth()+n);else weekStart=addDays(weekStart,n*7);render()}
function openExam(date='',time='14:00-16:00',e=null){document.getElementById('examModalTitle').textContent=e?'编辑考试':'新增考试';document.getElementById('exId').value=e?.id||'';document.getElementById('exCourse').value=e?.course||'';document.getElementById('exDate').value=e?.date||date||iso(today());document.getElementById('exTime').value=e?.time||time;document.getElementById('exLoc').value=e?.location||'';document.getElementById('exSeat').value=e?.seat||'';document.getElementById('examModal').classList.add('on')}function saveExam(ev){ev.preventDefault();let id=exId.value||'e'+Date.now(), data={id,course:exCourse.value,date:exDate.value,time:exTime.value,location:exLoc.value,seat:exSeat.value};let i=exams.findIndex(x=>x.id===id);i>-1?exams[i]=data:exams.push(data);save('exams',exams);ensureChapters();closeModal('examModal');render();toast('已保存考试')}function deleteExam(){let id=exId.value;if(!id)return;exams=exams.filter(e=>e.id!==id);save('exams',exams);closeModal('examModal');render();toast('已删除考试')}
function openCourse(c){activeCourse=c;selectedChapter=null;render()}function backCalendar(){activeCourse=null;render()}function courseExam(){return exams.find(e=>e.course===activeCourse)||exams[0]}function courseCh(){return chapters[activeCourse]||[]}
function renderCourse(){document.getElementById('calendarView').classList.remove('on');const cv=document.getElementById('courseView');cv.classList.add('on');let e=courseExam(), ch=courseCh(), total=ch.reduce((s,c)=>s+(+c.duration||1),0), done=ch.filter(c=>c.status==='done').reduce((s,c)=>s+(+c.duration||1),0), p=total?Math.round(done/total*100):0;let html='<div class="course-page"><div class="panel"><div class="panel-head"><b>'+activeCourse+'</b><button class="btn ghost" onclick="openExam(\'\',\'\',exams.find(e=>e.course===activeCourse))">编辑考试</button></div><div class="panel-body"><div class="progress"><div class="ring" style="--p:'+p+'%" data-p="'+p+'%"></div><div class="stat">考试：'+md(e.date)+' '+e.time+'<br>地点：'+e.location+' · 座号 '+e.seat+'<br>总时长：'+total+'h · 已完成：'+done+'h</div></div><div class="add-row"><input class="input" id="quickTitle" placeholder="新章节标题" onkeydown="if(event.key===\'Enter\')quickAdd()"><input class="input" id="quickDur" type="number" step="0.5" value="1" style="width:70px"><button class="btn primary" onclick="quickAdd()">添加</button></div>'+ch.map(chapterCard).join('')+'</div></div><div class="panel"><div class="panel-head"><b>复习进程日历</b><span class="pill">横向拖动查看日期</span></div><div class="strip-wrap"><div class="strip">'+reviewDays(e,ch).join('')+'</div></div></div></div>';cv.innerHTML=html}
function chapterCard(c){let cls='chapter '+(c.status==='done'?'done ':'')+(selectedChapter===c.id?'selected':'');return '<div class="'+cls+'" draggable="true" onclick="selectChapter(\''+c.id+'\')" ondragstart="dragCh(event,\''+c.id+'\')"><div class="tools"><button class="tool" onclick="event.stopPropagation();clearChapter(\''+c.id+'\')">↺</button><button class="tool" onclick="event.stopPropagation();openChapter(\''+c.id+'\')">✎</button><button class="tool del" onclick="event.stopPropagation();deleteChapter(\''+c.id+'\')">×</button></div><div class="ct">'+c.title+'</div><div class="cm">'+(c.duration||1)+'h · '+statusName(c.status)+(c.date?' · '+md(c.date):' · 未安排')+'</div></div>'}function statusName(s){return s==='done'?'已完成':s==='doing'?'进行中':'未开始'}function selectChapter(id){selectedChapter=id;renderCourse()}function dragCh(ev,id){ev.dataTransfer.setData('text/plain',id)}function reviewDays(e,ch){let a=today(), b=new Date(e.date+'T00:00:00');if(a>b)a=new Date(e.date+'T00:00:00');let arr=[];for(let d=new Date(a);d<=b;d=addDays(d,1)){let s=iso(d), items=ch.filter(c=>c.date===s), full=items.length&&items.every(c=>c.status==='done');arr.push('<div class="review-day '+(s===iso(today())?'today ':'')+(full?'fullgreen':'')+'" ondragover="event.preventDefault()" ondrop="dropCh(event,\''+s+'\')" onclick="dayClick(\''+s+'\')"><div class="rdh">'+md(s)+' '+cnDay(d)+'</div>'+(items.length?items.map(schedCard).join(''):'<div class="drop-tip">拖章节到这里<br>或先选章节再点我</div>')+'</div>')}return arr}function schedCard(c){let h=50+Math.min(150,(+c.duration||1)*24);return '<div class="sched-card '+(c.status==='done'?'done':'')+'" style="height:'+h+'px"><div class="sched-actions"><button onclick="event.stopPropagation();cycleStatus(\''+c.id+'\')">✓</button><button onclick="event.stopPropagation();clearChapter(\''+c.id+'\')">×</button></div><b>'+c.title+'</b><small>'+c.duration+'h · '+statusName(c.status)+'</small></div>'}function dayClick(s){if(selectedChapter){assignChapter(selectedChapter,s);selectedChapter=null}}function dropCh(ev,s){assignChapter(ev.dataTransfer.getData('text/plain'),s)}function assignChapter(id,s){let c=courseCh().find(x=>x.id===id);if(c){c.date=s;if(c.status==='todo')c.status='doing';save('chapters',chapters);renderCourse();toast('已安排到 '+md(s))}}function cycleStatus(id){let c=courseCh().find(x=>x.id===id);if(!c)return;c.status=c.status==='todo'?'doing':c.status==='doing'?'done':'todo';save('chapters',chapters);renderCourse()}function clearChapter(id){let c=courseCh().find(x=>x.id===id);if(c){c.date='';c.status='todo';save('chapters',chapters);renderCourse();toast('已清除安排')}}function deleteChapter(id){chapters[activeCourse]=courseCh().filter(c=>c.id!==id);save('chapters',chapters);renderCourse();toast('已删除章节')}function clearCourse(){courseCh().forEach(c=>{c.date='';c.status='todo'});save('chapters',chapters);renderCourse();toast('已清空本课安排')}function quickAdd(){let t=document.getElementById('quickTitle').value.trim();if(!t)return;courseCh().push({id:'c'+Date.now(),title:t,duration:+document.getElementById('quickDur').value||1,status:'todo',date:'',note:''});save('chapters',chapters);renderCourse()}
function openChapter(id=''){let c=id?courseCh().find(x=>x.id===id):{id:'',title:'',duration:1,status:'todo',date:'',note:''};chId.value=c.id;chTitle.value=c.title;chDur.value=c.duration||1;chStatus.value=c.status||'todo';chDate.value=c.date||'';chNote.value=c.note||'';document.getElementById('chapterModal').classList.add('on')}function saveChapter(ev){ev.preventDefault();let id=chId.value||'c'+Date.now(), c={id,title:chTitle.value,duration:+chDur.value||1,status:chStatus.value,date:chDate.value,note:chNote.value};let arr=courseCh(), i=arr.findIndex(x=>x.id===id);i>-1?arr[i]=c:arr.push(c);save('chapters',chapters);closeModal('chapterModal');renderCourse();toast('已保存章节')}function deleteChapterFromModal(){if(chId.value)deleteChapter(chId.value);closeModal('chapterModal')}
function renderRight(){let next=exams.filter(e=>new Date(e.date+'T'+e.time.split('-')[0])>=today()).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];let days=next?Math.ceil((new Date(next.date+'T00:00:00')-today())/86400000):0;rightPanel.innerHTML='<div class="box next"><span class="pill">NEXT EXAM</span>'+(next?'<h2>'+next.course+'</h2><div class="stat">'+md(next.date)+' '+next.time+'<br>'+next.location+' · 座号 '+next.seat+'<br>还有 <b>'+days+'</b> 天</div>':'<h2>期末考试已结束</h2>')+'</div><div class="box"><h3>Calendar Events</h3>'+exams.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>'<button class="event-item" onclick="openCourse(\''+e.course+'\')"><b>'+e.course+'</b><br><small>'+md(e.date)+' '+e.time+' · '+e.location+'</small></button>').join('')+'</div><div class="box"><h3>My Tasks</h3><div class="empty">暂无任务<br>这里保留空状态</div></div>'}
function showStats(){let n=Object.values(chapters).flat(), d=n.filter(c=>c.status==='done').length;toast('章节总数 '+n.length+'，完成 '+d)}function resetAll(){if(!confirm('确定重置所有本地数据？'))return;localStorage.clear();exams=structuredClone(EXAMS0);chapters={};activeCourse=null;view='month';ensureChapters();render();toast('已重置')}document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('examModal');closeModal('chapterModal')}});init();
</script>
</body>
